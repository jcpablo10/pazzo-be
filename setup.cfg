[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    */migrations/*,
    venv,
    env,
    .venv,
    .env
ignore = E203, E266, W503
per-file-ignores =
    __init__.py:F401

[isort]
profile = black
line_length = 100
skip = migrations,venv,env,.venv,.env
known_django = django
known_first_party = apps,config,shared
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
